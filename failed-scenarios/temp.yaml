apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: cka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:18              # ✅ Pinned image tag
        env:
        - name: POSTGRES_USER
          value: admin
        - name: POSTGRES_PASSWORD
          value: password
        - name: POSTGRES_DB
          value: mydatabase
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql          # ✅ Parent path for Postgres 18+ 
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: db-pvc