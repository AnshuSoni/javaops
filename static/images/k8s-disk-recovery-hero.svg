<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326ce5"/>
      <stop offset="100%" style="stop-color:#5b9bd5"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00f5a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>
  <!-- ── LEFT SIDE: Kubernetes wheel icon ── -->
  <g transform="translate(160,200)" filter="url(#softglow)">
    <!-- Outer ring -->
    <circle r="75" fill="none" stroke="url(#glowBlue)" stroke-width="4" opacity="0.9"/>
    <!-- Inner circle -->
    <circle r="22" fill="url(#glowBlue)" opacity="0.95"/>
    <!-- 7 spokes -->
    <g stroke="url(#glowBlue)" stroke-width="4" opacity="0.9">
      <line x1="0" y1="-22" x2="0" y2="-60"/>
      <line x1="20.9" y1="-8" x2="57.1" y2="-21.9"/>
      <line x1="20.9" y1="8" x2="57.1" y2="21.9"/>
      <line x1="0" y1="22" x2="0" y2="60"/>
      <line x1="-20.9" y1="8" x2="-57.1" y2="21.9"/>
      <line x1="-20.9" y1="-8" x2="-57.1" y2="-21.9"/>
      <line x1="0" y1="-22" x2="0" y2="-60" transform="rotate(25.7)"/>
    </g>
    <!-- Helm dots on ring -->
    <circle cx="0" cy="-75" r="7" fill="url(#glowBlue)"/>
    <circle cx="71.2" cy="-21.9" r="7" fill="url(#glowBlue)"/>
    <circle cx="71.2" cy="21.9" r="7" fill="url(#glowBlue)"/>
    <circle cx="0" cy="75" r="7" fill="url(#glowBlue)"/>
    <circle cx="-71.2" cy="21.9" r="7" fill="url(#glowBlue)"/>
    <circle cx="-71.2" cy="-21.9" r="7" fill="url(#glowBlue)"/>
    <!-- K letter -->
    <text x="-8" y="8" font-family="monospace" font-weight="bold" font-size="18" fill="white">k</text>
  </g>
  <!-- ── CENTER: Main Text ── -->
  <g transform="translate(600,200)">
    <!-- Tag line above -->
    <text x="0" y="-110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#00d4aa" letter-spacing="6" font-weight="600">KUBERNETES · POSTGRESQL · STORAGE</text>
    <!-- Main headline -->
    <text x="0" y="-55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="42" fill="white" filter="url(#glow)">Recover Your Data</text>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="42" fill="white">After Deleting a PVC</text>
    <!-- Sub headline -->
    <text x="0" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#a0c4d8" font-style="italic">PersistentVolume best practices · claimRef recovery · Postgres 18+</text>
    <!-- Bottom badge row -->
    <g transform="translate(-195, 90)">
      <!-- Badge 1 -->
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#326ce520" stroke="#326ce5" stroke-width="1.5"/>
      <text x="60" y="21" text-anchor="middle" font-family="monospace" font-size="13" fill="#326ce5" font-weight="bold">reclaimPolicy</text>
      <!-- Badge 2 -->
      <rect x="135" y="0" width="110" height="32" rx="16" fill="#00d4aa20" stroke="#00d4aa" stroke-width="1.5"/>
      <text x="190" y="21" text-anchor="middle" font-family="monospace" font-size="13" fill="#00d4aa" font-weight="bold">volumeName</text>
      <!-- Badge 3 -->
      <rect x="260" y="0" width="130" height="32" rx="16" fill="#f5a62320" stroke="#f5a623" stroke-width="1.5"/>
      <text x="325" y="21" text-anchor="middle" font-family="monospace" font-size="13" fill="#f5a623" font-weight="bold">kubectl patch</text>
    </g>
  </g>
  <!-- ── RIGHT SIDE: Database cylinder stack ── -->
  <g transform="translate(1040,200)">
    <!-- Glow behind -->
    <ellipse cx="0" cy="0" rx="65" ry="65" fill="#00d4aa" opacity="0.06"/>
    <!-- DB cylinder 1 (bottom) -->
    <ellipse cx="0" cy="50" rx="45" ry="12" fill="#1a4a3a" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="-45" y="22" width="90" height="28" fill="#1a4a3a" stroke="#00d4aa" stroke-width="1.5"/>
    <ellipse cx="0" cy="22" rx="45" ry="12" fill="#225544" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- DB cylinder 2 (middle) -->
    <ellipse cx="0" cy="10" rx="45" ry="12" fill="#1a4a3a" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="-45" y="-18" width="90" height="28" fill="#1a4a3a" stroke="#00d4aa" stroke-width="1.5"/>
    <ellipse cx="0" cy="-18" rx="45" ry="12" fill="#225544" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- DB cylinder 3 (top) -->
    <ellipse cx="0" cy="-30" rx="45" ry="12" fill="#1a4a3a" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="-45" y="-58" width="90" height="28" fill="#1a4a3a" stroke="#00d4aa" stroke-width="1.5"/>
    <ellipse cx="0" cy="-58" rx="45" ry="12" fill="#2a6655" stroke="#00d4aa" stroke-width="2"/>
    <!-- Recovery checkmark -->
    <circle cx="38" cy="-68" r="14" fill="#00d4aa" filter="url(#glow)"/>
    <text x="38" y="-62" text-anchor="middle" font-size="16" fill="white" font-weight="bold">✓</text>
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#00d4aa" letter-spacing="2">DATA SAFE</text>
  </g>
  <!-- Date stamp bottom left -->
  <text x="20" y="388" font-family="monospace" font-size="11" fill="#ffffff30">April 2026 · CKA101 | Abhishek Soni</text>
</svg>